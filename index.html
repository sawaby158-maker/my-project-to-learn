<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Product list with cart</title>
    <link rel="stylesheet" href="bootstrap-icons.css" />
    <link rel="stylesheet" href="bootstrap.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="background-color: rgb(233, 225, 225)" class="p-5">
    <div class="container">
      <div class="row">
        <div class="col-12 col-lg-8">
          <div class="container">
            <div class="row shop-list">
              <div class="col-12">
                <h1 style="font-weight: 800">Desserts</h1>
              </div>
            </div>
          </div>
        </div>

        <div
          class="col-12 col-md-4 py-3 mt-md-0 mt-4"
          style="
            background-color: white;
            height: fit-content;
            border-radius: 10px;
          "
        >
          <div class="container">
            <div class="row order-list">
              <div class="col-12">
                <h4 style="color: red" class="mb-3">
                  your cart(<span class="count-list">0</span>)
                </h4>
              </div>

              <div
                class="col-12 d-flex justify-content-center align-items-center order-impaty"
              >
                <img src="assets/images/illustration-empty-cart.svg" />
              </div>

              <div class="col-12 order-impaty">
                <p class="text-center" style="color: rgba(148, 7, 7, 0.4)">
                  your added items will appear here
                </p>
              </div>
              <div
                class="col-12 d-flex align-items-center justify-content-between mt-3 order-2 none total-div"
              >
                <p>total</p>
                <p class="total" style="font-weight: 700; font-size: x-large">
                  $200
                </p>
              </div>

              <div
                class="col-12 btn btn-light d-flex align-items-center justify-content-center order-2 mt-3 carbon none"
                style="height: 60px; display: none"
              >
                <img
                  src="assets/images/icon-carbon-neutral.svg"
                  style="height: 20px"
                  class="align-self-start mt-2 me-1"
                />
                <p style="color: gray">
                  This is a
                  <span style="color: black">carbon-neutral</span> delivery
                </p>
              </div>

              <div class="col-12 text-center confirm-btn order-2 mt-3">
                <button class="btn btn-success" onclick="order_complete()">
                  confirm order
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div
      style="
        height: fit-content;
        width: 30vw;
        background-color: white;
        position: absolute;
        top: 30vh;
        right: 35vw;
        border-radius: 20px;
      "
      class="container container-confirm p-2 d-none"
    >
    <!-- ///////////////////////////// -->
      <div class="row">
        <div class="col-10">
          <img src="assets/images/icon-order-confirmed.svg" />
        </div>
        <div class="col-10">
          <h1>order confirmed</h1>
        </div>
        <div class="col-10">
          <p style="color: rgba(148, 7, 7, 0.4)">
            we hope your enjoy yor food!
          </p>
        </div>
        <div
          class="col-10 confirmed-order mx-auto my-3"
          style="background-color: wheat; border-radius: 10px"
        >
          <div class="container">
            <div class="row order-complete" style="height: fit-content;">
              <div class="col-12 order-3 d-flex justify-content-between align-items-center">
                <p>order total</p>
                <p class="total-complete" style="font-size: x-large; font-weight: 700;"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-10 mx-auto">
        <button class="btn btn-warning w-100">start new order</button>
      </div>
    </div>
    <script src="bootstrap.bundle.js"></script>
    <script src="script.js"></script>
  </body>
</html>
